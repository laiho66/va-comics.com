<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA COMICS | Cinematic Teaser</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Teko:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --magma-orange: #ff4500; }
        
        body, html { 
            margin: 0; padding: 0; background-color: #050505; 
            height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* Fundalul paginii */
        .page-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg-home.webp') center/cover no-repeat;
            filter: brightness(0.15) blur(8px); z-index: -1;
        }

        /* Containerul Player-ului */
        .video-frame {
            position: relative;
            width: 90%; max-width: 1100px;
            border: 1px solid rgba(255, 69, 0, 0.4);
            background: #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            /* Aspect ratio container for YouTube */
            aspect-ratio: 16 / 9;
        }

        /* Stil Iframe YouTube */
        iframe { 
            width: 100%; 
            height: 100%; 
            display: block; 
            border: none;
            outline: none;
        }

        .teaser-footer {
            margin-top: 40px; text-align: center;
        }

        .teaser-title {
            font-family: 'Teko', sans-serif; font-size: 2.5rem;
            color: var(--magma-orange); text-transform: uppercase;
            letter-spacing: 8px; margin-bottom: 20px;
        }
        
        .nav-back {
            color: rgba(255, 255, 255, 0.6); text-decoration: none;
            border-bottom: 1px solid transparent; padding-bottom: 2px;
            text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-back:hover { color: #fff; border-color: var(--magma-orange); }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="video-frame">
        <iframe 
            src="https://www.youtube.com/embed/Sd7--V8R1ks?autoplay=1&mute=1&controls=1&rel=0" 
            title="Dead Drop Cinematic Teaser" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="teaser-footer">
        <h1 class="teaser-title">Teaser: Dead Drop</h1>
        <a href="index.html" class="nav-back">← Return to Vault</a>
    </div>

</body>
</html>
