<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA COMICS | Dead Drop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Teko:wght@600&display=swap" rel="stylesheet">
    <style>
        body { justify-content: flex-start !important; padding-top: 50px; }
        
        .page-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg-home.webp') center/cover no-repeat;
            filter: brightness(0.12) blur(10px); z-index: -1;
        }

        .video-container {
            width: 95% !important; 
            max-width: 1300px !important;
            margin: 20px auto !important;
            flex-shrink: 0;
        }

        .video-frame {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border: 1px solid rgba(255, 69, 0, 0.3);
            background: #000;
        }

        .video-frame iframe { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border: none;
        }

        .teaser-footer {
            margin-top: 40px;
            text-align: center;
            padding-bottom: 60px;
        }

        .teaser-title {
            font-family: 'Teko', sans-serif;
            color: var(--magma-orange);
            font-size: 2.8rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="video-container">
        <div class="video-frame">
            <iframe 
                src="https://www.youtube.com/embed/Sd7--V8R1ks?autoplay=1&mute=1&rel=0&modestbranding=1" 
                title="Dead Drop Cinematic Teaser" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="teaser-footer">
        <h1 class="teaser-title">Teaser: Dead Drop</h1>
        <a href="index.html" class="nav-back-btn">Return to Vault</a>
    </div>

</body>
</html>
