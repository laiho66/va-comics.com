backend:
  name: github
  repo: laiho66/va-comics.com
  branch: main
  base_url: https://github-os-proxy.vercel.app # Proxy-ul care ne lasă să intrăm
  client_id: 295a31ab33640599fb2e54d4b98beef90d2dbd5b
publish_mode: editorial_workflow

media_folder: "assets"
public_folder: "/assets"

collections:
  # 1. COLECȚIA DE CRONICI
  - name: "chronicles"
    label: "Chronicles"
    folder: "content/chronicles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      
      - label: "Linked Volume"
        name: "linked_volume"
        widget: "relation"
        collection: "volumes"
        search_fields: ["title"]
        value_field: "url"
        display_fields: ["title"]
        required: false

      - {label: "Log Content", name: "body", widget: "markdown"}

  # 2. COLECȚIA DE VOLUME
  - name: "volumes"
    label: "Volumes Library"
    editor:
      preview: false
    files:
      - label: "Dead Drop: Volume 1"
        name: "vol1"
        file: "content/volumes/vol1.md"
        fields:
          - {label: "Title", name: "title", widget: "string", default: "Volume 1"}
          - {label: "URL", name: "url", widget: "string", default: "deaddrop/vol1.html"}
      - label: "Dead Drop: Volume 2"
        name: "vol2"
        file: "content/volumes/vol2.md"
        fields:
          - {label: "Title", name: "title", widget: "string", default: "Volume 2"}
          - {label: "URL", name: "url", widget: "string", default: "deaddrop/vol2.html"}
