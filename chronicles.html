<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA COMICS | Chronicles</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Teko:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        .chronicles-bg { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: url('bg-home.webp') center/cover no-repeat; 
            filter: brightness(0.2); 
            z-index: 1; 
        }

        .chron-content { 
            position: relative; 
            z-index: 10; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 150px 20px 50px 20px; 
            text-align: center;
        }

        .chron-title { 
            font-family: 'Teko', sans-serif; 
            font-size: 5rem; 
            letter-spacing: 10px; 
            color: var(--magma-orange); 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }

        .log-entry { 
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid rgba(255, 69, 0, 0.1);
            border-left: 4px solid var(--magma-orange);
            padding: 40px;
            margin-bottom: 40px;
            text-align: left;
        }

        .log-date {
            font-family: 'Teko', sans-serif;
            color: var(--magma-orange);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .log-text { 
            font-family: 'Rajdhani', sans-serif; 
            color: rgba(255, 255, 255, 0.9); 
            font-size: 1.3rem; 
            line-height: 1.6;
        }

        .chronicle-expand summary {
            cursor: pointer;
            color: var(--magma-orange);
            font-family: 'Teko';
            letter-spacing: 2px;
            margin-top: 15px;
        }

        @media (max-width: 1024px) { 
            .chron-content { padding-top: 50px; } 
            .chron-title { font-size: 3rem; } 
        }
    </style>
</head>
<body>
    <div class="chronicles-bg"></div>

    <header>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item">
                <a href="deaddrop/index.html" class="nav-link">Dead Drop</a>
                <div class="dropdown">
                    <a href="deaddrop/vol1.html" class="dropdown-link">Volume 1</a>
                    <a href="deaddrop/vol2.html" class="dropdown-link">Volume 2</a>
                </div>
            </li>
            <li class="nav-item"><a href="chronicles.html" class="nav-link">Chronicles</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About us</a></li>
            <li class="nav-item">
                <a href="contact.html" class="nav-link">Contact</a>
                <div class="dropdown">
                    <a href="sendreport.html" class="dropdown-link">Send Report</a>
                    <a href="fieldlogs.html" class="dropdown-link">Field Logs</a>
                </div>
            </li>
            <li class="nav-item"><a href="teaser.html" class="nav-link">Teaser</a></li>
        </ul>
    </header>

    <main class="chron-content">
        <h1 class="chron-title">THE <span>CHRONICLES</span></h1>


        <div id="dynamic-logs"></div>
    </main>

    <footer style="position: relative; z-index: 999; text-align: center; padding: 50px 0;">
        <p style="letter-spacing: 4px; color: #fff; text-transform: uppercase;">&copy; 2026 VA COMICS STUDIO&trade;</p>
    </footer>

    <script>
      async function loadAutomatedLogs() {
        const container = document.getElementById('dynamic-logs');
        // REPO-UL TĂU OFICIAL
        const repo = 'laiho66/va-comics.com';
        const path = 'content/chronicles';

        try {
          const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`);
          const files = await response.json();

          // Sortăm invers (cele mai noi fișiere MD primele)
          files.reverse();

          for (const file of files) {
            if (file.name.endsWith('.md')) {
              const res = await fetch(file.download_url);
              const rawText = await res.text();

              // Extragem Titlul și Data din Markdown
              const title = rawText.match(/title: "(.*)"/)?.[1] || "New Entry";
              const dateRaw = rawText.match(/date: (.*)/)?.[1] || "";
              const date = dateRaw.split('T')[0] || "Recent";
              
              // Separăm conținutul de setări (după a doua linie ---)
              const parts = rawText.split('---');
              const content = parts.length > 2 ? parts[2].trim() : parts[0];

              // Creăm elementul vizual identic cu Origins
              const article = document.createElement('article');
              article.className = 'log-entry';
              article.innerHTML = `
                <div class="log-date">TIMESTAMP: ${date}</div>
                <h2 style="font-family:'Teko'; color:#fff; text-transform: uppercase; margin-top: 0;">${title}</h2>
                <div class="log-text">${content.replace(/\n/g, '<br>')}</div>
              `;
              container.appendChild(article);
            }
          }
        } catch (err) {
          console.log("Încă nu sunt log-uri noi sau eroare la API.");
        }
      }
      loadAutomatedLogs();
    </script>
</body>
